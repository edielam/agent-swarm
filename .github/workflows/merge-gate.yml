name: Merge Gate

on:
  pull_request:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.check.outputs.code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Check for code changes
        id: check
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          CODE_CHANGED=$(echo "$CHANGED" | grep -v '^docs-site/' | grep -v '^landing/' | grep -v '^$' || true)
          if [ -n "$CODE_CHANGED" ]; then
            echo "code=true" >> $GITHUB_OUTPUT
            echo "Code files changed:"
            echo "$CODE_CHANGED"
          else
            echo "code=false" >> $GITHUB_OUTPUT
            echo "No code files changed (only docs-site/ or landing/)"
          fi

  lint-and-typecheck:
    name: Lint and Type Check
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: depot-ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome linter
        run: bun run lint

      - name: Run TypeScript type check
        run: bun run tsc:check

  test:
    name: Run Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: depot-ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  docker-build:
    name: Docker Build Test
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: depot-ubuntu-latest

    strategy:
      matrix:
        dockerfile: [Dockerfile, Dockerfile.worker]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: false
          tags: test-image:latest

  gate:
    name: Merge Gate
    needs: [detect-changes, lint-and-typecheck, test, docker-build]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check results
        run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | jq -e 'map(select(. != "success" and . != "skipped")) | length > 0' > /dev/null 2>&1; then
            echo "::error::Some required jobs failed!"
            exit 1
          fi
          echo "All jobs passed or were skipped."
